name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r requirements.txt
      - run: python skills/skill-stocktake/scripts/audit_skills.py --root repo=skills --strict
      - run: python -m py_compile skills/skill-stocktake/scripts/audit_skills.py

  validate-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r requirements.txt
      - run: python skills/skill-stocktake/scripts/audit_skills.py --root repo=skills --strict
      - run: python -m py_compile skills/skill-stocktake/scripts/audit_skills.py
